name: Build and push to ecr

on: 
    push:
        # pull_requests:
        #    branche:['main', 'dev']
        branches: ['main']
permissions:
    id-token: write
    contents: read

jobs: 
    bui_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code 
              uses: actions/checkout@v7
            - name: Trivy scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: HIGH,CRITICAL
                exit-code: 1

            - name: Build Docker Image
              run: docker build -t 650959877739.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
            
            - name: Scan image with Trivy 
              uses: aquasecurity/trivy-action@v0.36.0 
              with: 
                image-ref: 650959877739.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest 
                format: table 
                exit-code: 0
                ignore-unfixed: true 
                severity: CRITICAL,HIGH

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                aws-region: us-east-1
                role-to-assume: arn:aws:iam::650959877739:role/github_action_rol
                
            - name: Loggin to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            
            - name: Push image to Ecr
              run: docker push 650959877739.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
