name: Build and push to ecr

on: 
    push:
        # pull_requests:
        #    branche:['main', 'dev']
        branches: ['main']
jobs: 
    bui_scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the code 
              uses: sctions/checkout@v7
            - name: Trivy scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: HIGH,CRITICAL
                exit-code: 1
            - name: Build Docker Image
              run: docker build -t 650959877739.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .
            
            - name: Scan image with Trivy 
              uses: aquasecurity/trivy-action@0.28.0 
              with: 
                image-ref: 650959877739.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest 
                format: table 
                exit-code: 1 
                ignore-unfixed: true 
                severity: CRITICAL,HIGH
            - name: Push Image to Ecr
              run: echo "push"
