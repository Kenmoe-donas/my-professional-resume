name: My first pipeline

on:
    push: 
        branches: [ "main" ]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: clone the code
              uses: actions/checkout@v4
            - name: Build image
              run:
                docker build -t donatienkt/cicd-portfolio
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: donatienkt
                password: $({secrets.docker_pass})
            - name: push image
              run:
                docker push docnatienkt/cicd-portfolio

            


